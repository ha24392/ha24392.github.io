<html>
<head>
  <script src="https://xsukax.github.io/xsukax-JS-CAPTCHA/captcha.js"></script>
</head>
<body>
  <style>* { font-family: sans-serif }</style>
  
  <h1>Survey</h1>
  <p>Please confirm you are not a robot to access the survey:</p>
  <form action="/submit" method="POST" style="width: 600px;">
    
    <!-- CAPTCHA will be automatically inserted here -->
    <div id="bot-check" class="xsukax-captcha"></div>
    
    <button type="submit">Submit</button>
</form>

<script>
    function verifyCaptcha() {
        const captchaVerified = window.xsukaxCAPTCHA.isVerified('bot-check');
        if(captchaVerified) {
            console.log("CAPTCHA Verified!")
        }

        setTimeout(function() { verifyCaptcha(); }, 250);
    }

    setTimeout(function() { verifyCaptcha(); }, 500);
</script>
</body>
</html>
